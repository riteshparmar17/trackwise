{% extends 'base.html' %}
{% block title %}Edit Expense · TrackWise{% endblock %}
{% block content %}
<div class="row justify-content-center">
 <div class="col-md-7">
  <div class="card p-4">
    <h2 class="h4 fw-bold mb-4">✏️ Edit Expense</h2>
    <form method="POST" enctype="multipart/form-data">

      <div class="mb-3">
        <label class="form-label fw-semibold">Date *</label>
        <input type="date" class="form-control" name="expense_date"
               value="{{ expense.expense_date }}" required>
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold">Type of Expense *</label>
        <select class="form-select" name="expense_type" required>
          <option value="">— Select type —</option>
          {% for t in expense_types %}
          <option value="{{ t }}"
            {{ 'selected' if expense.expense_type == t }}>{{ t }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold">Vendor / Store *</label>
        <input type="text" class="form-control" name="vendor"
               value="{{ expense.vendor }}" required>
      </div>

      <div class="row g-3 mb-2">
        <div class="col-7">
          <label class="form-label fw-semibold">Total Amount (incl. HST) *</label>
          <div class="input-group">
            <span class="input-group-text">$</span>
            <input type="number" class="form-control" name="amount" id="amount"
                   step="0.01" min="0.01"
                   value="{{ expense.total_amount }}" required>
          </div>
          <div class="form-text">Enter the total from your receipt</div>
        </div>
        <div class="col-5">
          <label class="form-label fw-semibold">HST / Tax</label>
          <div class="input-group">
            <span class="input-group-text">$</span>
            <input type="number" class="form-control" name="hst" id="hst"
                   step="0.01" min="0"
                   value="{{ expense.hst }}">
          </div>
          <div class="form-text">Auto-calc 13% · edit if needed</div>
        </div>
      </div>

      <div class="alert alert-secondary d-flex justify-content-between py-2 mb-3">
        <span class="text-muted small">Pre-tax amount:</span>
        <strong id="pretaxDisplay">${{ "%.2f"|format(expense.amount) }}</strong>
      </div>

      <div class="mb-4">
        <label class="form-label fw-semibold">Description</label>
        <textarea class="form-control" name="description" rows="2"
                  placeholder="Optional notes">{{ expense.description or '' }}</textarea>
      </div>

      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-warning flex-fill fw-semibold">
          Save Changes
        </button>
        <a href="{{ url_for('expenses.list_expenses') }}"
           class="btn btn-outline-secondary">Cancel</a>
      </div>
    </form>
  </div>
 </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
const amtEl    = document.getElementById('amount');
const hstEl    = document.getElementById('hst');
const pretaxEl = document.getElementById('pretaxDisplay');

function recalc() {
  const total  = parseFloat(amtEl.value) || 0;
  const hst    = parseFloat(hstEl.value) || 0;
  pretaxEl.textContent = '$' + Math.max(0, total - hst).toFixed(2);
}
amtEl.addEventListener('input', function() {
  const total = parseFloat(this.value) || 0;
  hstEl.value = (Math.round(total * 0.13 / 1.13 * 100) / 100).toFixed(2);
  recalc();
});
hstEl.addEventListener('input', recalc);
recalc(); // run on page load to show current pre-tax
</script>
{% endblock %}

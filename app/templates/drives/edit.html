{% extends 'base.html' %}
{% block title %}Complete Drive Log · TrackWise{% endblock %}
{% block content %}
<div class="row justify-content-center">
 <div class="col-md-6">
  <div class="card p-4">
    <h2 class="h4 fw-bold mb-3">✏️ Complete Drive Log</h2>

    <!-- Show what we know -->
    <div class="alert alert-info mb-4">
      <div class="row text-center">
        <div class="col-4">
          <div class="small text-muted">Date</div>
          <strong>{{ drive.log_date }}</strong>
        </div>
        <div class="col-4">
          <div class="small text-muted">Start KM</div>
          <strong>{{ drive.start_km }}</strong>
        </div>
        <div class="col-4">
          <div class="small text-muted">Purpose</div>
          <strong>{{ drive.purpose }}</strong>
        </div>
      </div>
    </div>

    <form method="POST">
      <div class="mb-3">
        <label class="form-label fw-semibold">End KM *</label>
        <div class="input-group input-group-lg">
          <input type="number" class="form-control" name="end_km" id="end_km"
                 step="0.1" min="{{ drive.start_km + 0.1 }}"
                 placeholder="Enter odometer reading" autofocus required>
          <span class="input-group-text">km</span>
        </div>
      </div>

      <div id="distPreview" class="alert alert-success py-2 mb-3 d-none">
        Distance driven: <strong id="distVal">—</strong>
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold">Purpose</label>
        <select class="form-select" name="purpose">
          {% for p in purposes %}
          <option value="{{ p }}" {{ 'selected' if drive.purpose == p }}>{{ p }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="mb-4">
        <label class="form-label fw-semibold">Notes</label>
        <textarea class="form-control" name="notes" rows="2">{{ drive.notes or '' }}</textarea>
      </div>

      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-warning flex-fill fw-semibold">
          Complete Entry ✓
        </button>
        <a href="{{ url_for('drives.list_drives') }}"
           class="btn btn-outline-secondary">Cancel</a>
      </div>
    </form>
  </div>
 </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
const startKm = parseFloat({{ drive.start_km | tojson }});
document.getElementById('end_km').addEventListener('input', function() {
  const e = parseFloat(this.value);
  const p = document.getElementById('distPreview');
  if (!isNaN(e) && e > startKm) {
    document.getElementById('distVal').textContent = (e - startKm).toFixed(1) + ' km';
    p.classList.remove('d-none');
  } else {
    p.classList.add('d-none');
  }
});
</script>
{% endblock %}

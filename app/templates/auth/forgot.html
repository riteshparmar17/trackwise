{% extends 'base_auth.html' %}
{% block title %}Forgot Password · TrackWise{% endblock %}
{% block content %}
<div class="row justify-content-center">
 <div class="col-md-5">
  <div class="card p-4 shadow-sm">
    <h2 class="h4 fw-bold mb-1">Forgot Password</h2>
    <p class="text-muted small mb-4">
      Enter your email and we will send a reset link valid for 1 hour.
    </p>
    <form method="POST">
      <div class="mb-3">
        <label class="form-label fw-semibold">Email</label>
        <input type="email" class="form-control" name="email"
               autofocus required placeholder="you@email.com">
      </div>
      <button type="submit" class="btn btn-primary w-100 mb-3">
        Send Reset Link
      </button>
      <p class="text-center">
        <a href="{{ url_for('auth.login') }}" class="small">Back to login</a>
      </p>
    </form>
  </div>
 </div>
</div>
{% endblock %}
